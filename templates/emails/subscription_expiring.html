<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Подписка скоро истекает</title>
</head>
<body style="margin:0;padding:24px;background:#0f1115;color:#e5e7eb;font-family:Arial,sans-serif;">
  <div style="max-width:640px;margin:0 auto;background:#171a21;border:1px solid #2b3240;border-radius:16px;padding:32px;">
    <h1 style="margin:0 0 16px;font-size:24px;line-height:1.3;color:#ffffff;">Подписка скоро истекает</h1>
    <p style="margin:0 0 12px;font-size:16px;line-height:1.6;">Здравствуйте, {{ user.username }}!</p>
    <p style="margin:0 0 12px;font-size:16px;line-height:1.6;">
      Напоминаем, что ваша подписка
      <strong style="color:#60a5fa;">{{ plan.get_name_display }}</strong>
      на <strong>{{ current_site.domain }}</strong>
      истекает <strong>{{ expires_at|date:"d.m.Y" }}</strong>.
    </p>
    <p style="margin:0 0 24px;font-size:16px;line-height:1.6;">
      Если хотите сохранить доступ к возможностям подписки, продлите ее заранее.
    </p>
    <p style="margin:0 0 24px;">
      <a href="{{ renew_url }}" style="display:inline-block;padding:12px 18px;border-radius:10px;background:#2563eb;color:#ffffff;text-decoration:none;font-weight:700;">
        Продлить подписку
      </a>
    </p>
  </div>
</body>
</html>
