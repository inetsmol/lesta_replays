{# templates/includes/sidebar/_support.html #}
{% load static %}

<div class="relative w-full min-w-0 overflow-hidden rounded-xl border border-[#292929] bg-[#141414] p-4 shadow-2xl">
  <!-- Декоративный фон -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-amber-500/5 via-transparent to-transparent"></div>

  <!-- Контент -->
  <div class="relative z-10 min-w-0">
    <!-- Заголовок с градиентной иконкой -->
    <div class="mb-3 flex items-center gap-2.5">
      <div class="relative">
        <svg width="22" height="22" viewBox="0 0 24 24" class="animate-pulse text-red-500" fill="currentColor" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4c1.74 0 3.41.81 4.5 2.09C12.09 4.81 13.76 4 15.5 4 18 4 20 6 20 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <div class="absolute inset-0 bg-red-500 blur-lg opacity-30 animate-pulse"></div>
      </div>
      <h3 class="bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-base font-bold text-transparent">
        Поддержать проект
      </h3>
    </div>

    <!-- Мотивационная фраза с акцентом -->
    <div class="mb-4 rounded-lg border border-[#292929] bg-[#1a1a1a] p-3 backdrop-blur-sm">
      <p class="text-[13px] leading-5 text-[#e6e6e6]" id="support-phrase">
        <!-- сюда подставится случайный текст -->
      </p>
    </div>

    <!-- YooMoney iframe -->
    <div class="mb-4 flex justify-center overflow-hidden">
      <iframe
        src="https://yoomoney.ru/quickpay/fundraise/button?billNumber=1D58232QB73.251002&"
        width="220"
        height="50"
        frameborder="0"
        allowtransparency="true"
        scrolling="no"
        style="max-width: 100%;"
        class="rounded-lg shadow-lg">
      </iframe>
    </div>

    <!-- Разделитель -->
    <div class="relative my-4">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-[#292929]"></div>
      </div>
      <div class="relative flex justify-center">
        <span class="bg-[#141414] px-3 text-xs text-[#b6b6b6]">или</span>
      </div>
    </div>

    <!-- Т-Банк секция -->
    <div class="mb-3">
      <div class="mb-2 flex items-center gap-2">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-yellow-400">
          <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
        </svg>
        <h4 class="text-sm font-semibold text-[#e6e6e6]">
          Для клиентов Т-Банк
        </h4>
      </div>

      <!-- QR-код с улучшенным дизайном -->
      <div class="mx-auto mb-3 max-w-[220px] overflow-hidden rounded-lg border-2 border-yellow-400/20 bg-white p-3 shadow-xl">
        <img
          src="{% static 'donation_qr.png' %}"
          alt="QR-код для доната на поддержку проекта"
          style="max-width: 100%;"
          class="w-full h-auto rounded">
        <p class="mt-1.5 text-center text-[11px] font-medium text-slate-600">
          📱 Сканируйте камерой — оплата в один клик
        </p>
      </div>

      <!-- Главная CTA кнопка с анимацией -->
      <a
        href="https://www.tinkoff.ru/rm/r_yPRgXbAsRv.klYbxJbAtH/nCNuX53972"
        target="_blank"
        rel="noopener"
        class="group relative flex w-full items-center justify-center gap-2 overflow-hidden rounded-lg px-4 py-2.5 text-sm font-semibold text-white transition-all duration-300 hover:scale-[1.02] hover:shadow-2xl active:scale-95">

        <!-- Градиентный фон -->
        <div class="absolute inset-0 bg-gradient-to-r from-amber-500 via-orange-500 to-yellow-500"></div>

        <!-- Анимированный блик -->
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-200%] group-hover:translate-x-[200%] transition-transform duration-700"></div>

        <!-- Пульсирующее свечение -->
        <div class="absolute inset-0 bg-yellow-400 blur-xl opacity-50 group-hover:opacity-70 transition-opacity animate-pulse"></div>

        <!-- Контент кнопки -->
        <span class="relative z-10 flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="transition-transform duration-300 group-hover:rotate-90">
            <path d="M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm1 5v3h3v2h-3v3h-2v-3H8v-2h3V8h2z"/>
          </svg>
          <span>Сделать донат</span>
        </span>
      </a>
    </div>

    <!-- Благодарность с badge -->
    <div class="mt-4 border-t border-[#292929] pt-3">
      <div class="flex items-start gap-2.5">
        <div class="mt-0.5 flex-shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-green-400">
            <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/>
          </svg>
        </div>
        <p class="text-xs leading-5 text-[#b6b6b6]">
          <span class="text-green-400 font-semibold">Спасибо!</span> Любая сумма важна — вы напрямую ускоряете разработку и улучшаете сервис. 🚀
        </p>
      </div>
    </div>

    <!-- Дополнительный badge (опционально) -->
    <div class="mt-3 inline-flex items-center gap-2 rounded-full border border-amber-500/20 bg-amber-500/10 px-2.5 py-1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="text-amber-400">
        <path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2z"/>
      </svg>
      <span class="text-[11px] font-medium text-amber-300">Каждый донат — это вклад в развитие</span>
    </div>
  </div>
</div>

<script>
(function() {
  const phrases = [
    "🚀 <strong>Каждая поддержка</strong> помогает серверу жить дольше и работать быстрее.",
    "⛽ Если нравится портал — <strong>подкиньте немного топлива</strong> в бак!",
    "💾 Ваши <strong>100 ₽ превращаются</strong> в сотни сохранённых реплеев.",
    "🎯 Поддержка проекта — это как <strong>апгрейд танка:</strong> сильнее, быстрее, надёжнее.",
    "🔧 Ваши <strong>100 ₽ держат портал</strong> на ходу, как ремкомплект в бою.",
    "✨ Каждый вклад — это <strong>новые фичи</strong> и стабильная работа сервера.",
    "📈 Всего <strong>100 ₽</strong> — и ещё один день бесперебойной работы сайта.",
    "🤝 Сайт работает благодаря вам — даже <strong>маленький взнос</strong> имеет значение.",
    "📊 <strong>100 ₽ от вас</strong> = новые возможности для аналитики и статистики.",
    "⚡ Помогите нам продолжать: каждые <strong>100 ₽ ускоряют разработку.</strong>"
  ];
  const el = document.getElementById('support-phrase');
  if (el) el.innerHTML = phrases[Math.floor(Math.random() * phrases.length)];
})();
</script>
